services:

  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: crm
      POSTGRES_USER: crm_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - internal

  backend:
    build:
      context: ./crm-new
      dockerfile: Dockerfile.prebuilt
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://crm_user:${DB_PASSWORD}@postgres:5432/crm
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      PORT: 3000
      # Бизнес живёт по Москве: без TZ отчёты режут месяцы/недели по UTC,
      # и заказ, отправленный 1-го числа ночью, попадал в прошлый месяц.
      TZ: Europe/Moscow
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_GROUP_CHAT_ID: ${TELEGRAM_GROUP_CHAT_ID}
      # Интеграция с исполнителем-партнёром (см. docs/partner-integration.md)
      PARTNER_WEBHOOK_URL: ${PARTNER_WEBHOOK_URL:-}
      PARTNER_WEBHOOK_TOKEN: ${PARTNER_WEBHOOK_TOKEN:-}
      PARTNER_API_TOKEN: ${PARTNER_API_TOKEN:-}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads:/app/uploads
    extra_hosts:
      - "api.telegram.org:149.154.167.220"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 45s
    command: >
      sh -c "npx prisma migrate deploy && node dist/src/main"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prebuilt
    restart: always
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - internal

volumes:
  pgdata:
  # ТЗ-фото (согласованные макеты) бэкенд пишет в /app/uploads. Том объявлен
  # здесь — иначе docker compose не парсит проект (backend ссылается на uploads).
  uploads:

networks:
  internal:
