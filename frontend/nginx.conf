server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Загрузка ТЗ-фото: телефонные снимки бывают 15–25 МБ. Дефолтный лимит
    # nginx — всего 1 МБ, из-за него большие фото отбивались с 413 ещё до
    # бэкенда, и в интерфейсе это выглядело как «файл не читается». Держим
    # чуть выше бэкендового лимита (30 МБ), чтобы про размер отвечал бэкенд
    # понятным сообщением, а не nginx кодом 413.
    client_max_body_size 30m;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Проксируем API-запросы на backend (включая Avito и партнёрский API).
    location ~ ^/(health|order-photo|auth|avito|users|salary|reports|expenses|stock|partner|tasks) {
        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # Хэшированные ассеты (index-XXXX.js/css) — кэшируем надолго,
    # имя файла меняется при каждой сборке, поэтому это безопасно.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # index.html НЕ кэшируем — иначе браузер грузит старый бандл после деплоя.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires -1;
    }

    # PWA-манифест: корректный MIME (в старых mime.types его нет) + без кэша.
    location = /manifest.webmanifest {
        default_type application/manifest+json;
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # React SPA — все остальные пути отдаём index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
