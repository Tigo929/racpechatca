server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Проксируем API-запросы на backend
    location ~ ^/(order-photo|auth|users|salary|reports|expenses|stock) {
        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # Хэшированные ассеты (index-XXXX.js/css) — кэшируем надолго,
    # имя файла меняется при каждой сборке, поэтому это безопасно.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # index.html НЕ кэшируем — иначе браузер грузит старый бандл после деплоя.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires -1;
    }

    # React SPA — все остальные пути отдаём index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
