services:

  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: crm
      POSTGRES_USER: crm_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal

  backend:
    build:
      context: ./crm-new
    restart: always
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://crm_user:${DB_PASSWORD}@postgres:5432/crm
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      PORT: 3000
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_GROUP_CHAT_ID: ${TELEGRAM_GROUP_CHAT_ID}
    # Хостинг (РФ) режет TCP 443 до большинства IP Telegram и резолвит
    # api.telegram.org только в IPv6 (недоступен). Пинуем домен на рабочий
    # IPv4 Bot API — иначе fetch к Telegram отваливается по таймауту.
    extra_hosts:
      - "api.telegram.org:149.154.167.220"
    networks:
      - internal
    # Применяет накопленные миграции и запускает сервер
    command: >
      sh -c "npx prisma migrate deploy && node dist/src/main"

  frontend:
    build:
      context: ./frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - internal

volumes:
  pgdata:

networks:
  internal:
