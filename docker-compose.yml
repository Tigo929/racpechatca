services:

  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: crm
      POSTGRES_USER: crm_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - internal

  backend:
    build:
      context: ./crm-new
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://crm_user:${DB_PASSWORD}@postgres:5432/crm
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      PORT: 3000
      TZ: Europe/Moscow
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_GROUP_CHAT_ID: ${TELEGRAM_GROUP_CHAT_ID}
      # Интеграция с исполнителем-партнёром (см. docs/partner-integration.md)
      PARTNER_WEBHOOK_URL: ${PARTNER_WEBHOOK_URL:-}
      PARTNER_WEBHOOK_TOKEN: ${PARTNER_WEBHOOK_TOKEN:-}
      PARTNER_API_TOKEN: ${PARTNER_API_TOKEN:-}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      AVITO_CLIENT_ID: ${AVITO_CLIENT_ID:-}
      AVITO_CLIENT_SECRET: ${AVITO_CLIENT_SECRET:-}
      AVITO_MESSENGER_POLLING_ENABLED: ${AVITO_MESSENGER_POLLING_ENABLED:-false}
      AVITO_MESSENGER_POLLING_INTERVAL_MS: ${AVITO_MESSENGER_POLLING_INTERVAL_MS:-60000}
      UPLOAD_DIR: /app/uploads
    volumes:
      # ТЗ-фото переживают пересборку контейнера.
      - uploads:/app/uploads
    # Хостинг (РФ) режет TCP 443 до большинства IP Telegram и резолвит
    # api.telegram.org только в IPv6 (недоступен). Пинуем домен на рабочий
    # IPv4 Bot API — иначе fetch к Telegram отваливается по таймауту.
    extra_hosts:
      - "api.telegram.org:149.154.167.220"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 45s
    # Применяет накопленные миграции и запускает сервер
    command: >
      sh -c "npx prisma migrate deploy && node dist/src/main"

  frontend:
    build:
      context: ./frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - internal

volumes:
  pgdata:
  uploads:

networks:
  internal:
