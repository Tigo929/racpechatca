services:

  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: crm
      POSTGRES_USER: crm_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal

  backend:
    build:
      context: ./crm-new
    restart: always
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://crm_user:${DB_PASSWORD}@postgres:5432/crm
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      PORT: 3000
    networks:
      - internal
    # Применяет накопленные миграции и запускает сервер
    command: >
      sh -c "npx prisma migrate deploy && node dist/main"

  frontend:
    build:
      context: ./frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - internal

volumes:
  pgdata:

networks:
  internal:
